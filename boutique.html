<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Boutique JUMU'A</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background-color: #f5f5f5;
        }

        header {
            background-color: #0d6efd;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background-color: #333;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }

        .container {
            padding: 20px;
        }

        .produits {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .produit {
            background: white;
            padding: 15px;
            border-radius: 10px;
            width: 200px;
            text-align: center;
            box-shadow: 0 0 10px gray;
        }

        .produit img {
            width: 100%;
        }

        .btn {
            background: #0d6efd;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
        }

        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<header>
    <h1>Boutique JUMU'A 🛒</h1>
    <p>Vente et maintenance d’équipements informatiques</p>
</header>

<nav>
    <a href="#">Accueil</a>
    <a href="#">Produits</a>
    <a href="#">Contact</a>
</nav>

<div class="container">
    <h2>Nos Produits</h2>

    <div class="produits">

        <div class="produit">
            <img src="https://via.placeholder.com/200" alt="PC Portable">
            <h3>PC Portable</h3>
            <p>350 000 FCFA</p>
            <button class="btn">Acheter</button>
        </div>

        <div class="produit">
            <img src="https://via.placeholder.com/200" alt="Imprimante">
            <h3>Imprimante</h3>
            <p>75 000 FCFA</p>
            <button class="btn">Acheter</button>
        </div>

        <div class="produit">
            <img src="https://via.placeholder.com/200" alt="Clavier">
            <h3>Clavier</h3>
            <p>10 000 FCFA</p>
            <button class="btn">Acheter</button>
        </div>

    </div>
</div>

<footer>
    <p>Contact : +226 55 37 44 50</p>
    <p>&copy; 2026 Boutique JUMU'A</p>
</footer>

</body>
</html>
